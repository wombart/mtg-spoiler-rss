Die Datei .github/workflows/update-feed.yml im Repository damit ersetzen – der einzige Unterschied ist das entfernte cache: "pip". Da das Script ausschließlich Python-Standardbibliotheken nutzt (urllib, json, xml usw.), wird pip-Caching gar nicht gebraucht.
