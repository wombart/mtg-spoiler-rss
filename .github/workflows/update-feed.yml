Plan: Magic: The Gathering Spoiler RSS Feed
Übersicht

Ein GitHub Actions Workflow, der regelmäßig die Scryfall API abfragt, neue Karten erkennt und einen RSS Feed generiert – gehostet auf GitHub Pages.
Architektur

Scryfall API
    ↓
GitHub Actions (Cronjob)
    ↓
Python Script
    ↓
RSS Feed (feed.xml) + known_cards.json
    ↓
GitHub Pages

Komponenten
1. Scryfall API Abfrage

Scryfall bietet mehrere nützliche Endpunkte:

    /cards/search?q=date>today&order=spoiled – neu gespoilerte Karten
    /sets – aktuelle und kommende Sets

Der Plan: Alle Karten der letzten X Tage abfragen, gefiltert nach dem Erscheinungsdatum bzw. preview.previewed_at.
2. Duplikat-Erkennung via oracle_id

Eine Datei known_cards.json wird im Repository gespeichert und enthält alle bereits gesehenen oracle_ids. Bei jedem Lauf:

    Neue Karten von Scryfall holen
    oracle_id gegen known_cards.json prüfen
    Nur neue Karten in den Feed aufnehmen
    known_cards.json aktualisieren und committen

3. RSS Feed Generierung (feed.xml)

Das Python-Script generiert eine valide RSS 2.0 XML-Datei mit:

    Titel der Karte
    Bild (Scryfall Image URL)
    Link zur Scryfall-Seite
    Set-Name und Mana-Kosten
    Kartentyp und Oracle-Text
    Publikationsdatum (preview.previewed_at)

4. GitHub Actions Workflow

Trigger:
  - schedule: alle 2 Stunden (cron)
  - workflow_dispatch (manuell auslösbar)

Steps:
  1. Checkout Repository
  2. Python setup
  3. Script ausführen
  4. Änderungen committen (feed.xml + known_cards.json)
  5. GitHub Pages deployment

5. GitHub Pages

    Branch gh-pages oder docs/-Ordner
    Der Feed ist dann erreichbar unter: https://<username>.github.io/<repo>/feed.xml

Dateistruktur

/
├── .github/
│   └── workflows/
│       └── update-feed.yml
├── scripts/
│   └── generate_feed.py
├── data/
